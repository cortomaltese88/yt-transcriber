name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bc ffmpeg yt-dlp

      - name: Install Node.js dependencies
        run: npm ci

      - name: Python bytecode check
        run: python3 -m py_compile yt-transcriber_gui.py transcriber_backend.py set_lang_it.py

      - name: Smoke test
        run: ./smoke_test.sh
